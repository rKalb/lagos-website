<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Waveform gradient: vivid coral → warm amber -->
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4F44"/>
      <stop offset="40%" style="stop-color:#FF7A50"/>
      <stop offset="70%" style="stop-color:#FFB05C"/>
      <stop offset="100%" style="stop-color:#FFC96B"/>
    </linearGradient>

    <!-- Warm colored glow -->
    <filter id="gl">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feFlood flood-color="#FF6A4A" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="b" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="ic">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>

    <!-- Background: medium-dark warm grey -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E2B3A"/>
      <stop offset="100%" style="stop-color:#232130"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Warm ambient glow -->
  <radialGradient id="rg" cx="50%" cy="48%" r="50%">
    <stop offset="0%" style="stop-color:#FF6A4A; stop-opacity:0.1"/>
    <stop offset="100%" style="stop-color:#232130; stop-opacity:0"/>
  </radialGradient>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#rg)"/>

  <!-- Grid lines -->
  <g opacity="0.05" clip-path="url(#ic)">
    <line x1="0" y1="180" x2="512" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="220" x2="512" y2="220" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="292" x2="512" y2="292" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="332" x2="512" y2="332" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Waveform: L-A-G-O-S — higher minimum opacity for better visibility -->
  <g filter="url(#gl)" clip-path="url(#ic)">
    <!-- L -->
    <rect x="38" y="238" width="3.5" height="36" rx="1.75" fill="url(#wg)" opacity="0.6"/>
    <rect x="47" y="218" width="3.5" height="76" rx="1.75" fill="url(#wg)" opacity="0.72"/>
    <rect x="56" y="198" width="3.5" height="116" rx="1.75" fill="url(#wg)" opacity="0.85"/>
    <rect x="65" y="180" width="3.5" height="152" rx="1.75" fill="url(#wg)" opacity="0.95"/>
    <rect x="74" y="172" width="3.5" height="168" rx="1.75" fill="url(#wg)"/>
    <rect x="83" y="178" width="3.5" height="156" rx="1.75" fill="url(#wg)" opacity="0.95"/>
    <rect x="92" y="192" width="3.5" height="128" rx="1.75" fill="url(#wg)" opacity="0.82"/>
    <rect x="101" y="210" width="3.5" height="92" rx="1.75" fill="url(#wg)" opacity="0.7"/>
    <rect x="110" y="228" width="3.5" height="56" rx="1.75" fill="url(#wg)" opacity="0.55"/>
    <rect x="119" y="240" width="3.5" height="32" rx="1.75" fill="url(#wg)" opacity="0.4"/>

    <!-- gap -->
    <rect x="130" y="250" width="3" height="12" rx="1.5" fill="url(#wg)" opacity="0.2"/>

    <!-- A -->
    <rect x="140" y="238" width="3.5" height="36" rx="1.75" fill="url(#wg)" opacity="0.45"/>
    <rect x="149" y="218" width="3.5" height="76" rx="1.75" fill="url(#wg)" opacity="0.6"/>
    <rect x="158" y="190" width="3.5" height="132" rx="1.75" fill="url(#wg)" opacity="0.78"/>
    <rect x="167" y="162" width="3.5" height="188" rx="1.75" fill="url(#wg)" opacity="0.9"/>
    <rect x="176" y="138" width="3.5" height="236" rx="1.75" fill="url(#wg)" opacity="0.96"/>
    <rect x="185" y="125" width="3.5" height="262" rx="1.75" fill="url(#wg)"/>
    <rect x="194" y="120" width="3.5" height="272" rx="1.75" fill="url(#wg)"/>
    <rect x="203" y="125" width="3.5" height="262" rx="1.75" fill="url(#wg)"/>
    <rect x="212" y="138" width="3.5" height="236" rx="1.75" fill="url(#wg)" opacity="0.95"/>
    <rect x="221" y="158" width="3.5" height="196" rx="1.75" fill="url(#wg)" opacity="0.85"/>
    <rect x="230" y="182" width="3.5" height="148" rx="1.75" fill="url(#wg)" opacity="0.7"/>
    <rect x="239" y="208" width="3.5" height="96" rx="1.75" fill="url(#wg)" opacity="0.55"/>
    <rect x="248" y="232" width="3.5" height="48" rx="1.75" fill="url(#wg)" opacity="0.4"/>

    <!-- gap -->
    <rect x="259" y="250" width="3" height="12" rx="1.5" fill="url(#wg)" opacity="0.2"/>

    <!-- G -->
    <rect x="269" y="240" width="3.5" height="32" rx="1.75" fill="url(#wg)" opacity="0.42"/>
    <rect x="278" y="220" width="3.5" height="72" rx="1.75" fill="url(#wg)" opacity="0.6"/>
    <rect x="287" y="188" width="3.5" height="136" rx="1.75" fill="url(#wg)" opacity="0.78"/>
    <rect x="296" y="155" width="3.5" height="202" rx="1.75" fill="url(#wg)" opacity="0.92"/>
    <rect x="305" y="140" width="3.5" height="232" rx="1.75" fill="url(#wg)"/>
    <rect x="314" y="148" width="3.5" height="216" rx="1.75" fill="url(#wg)" opacity="0.95"/>
    <rect x="323" y="165" width="3.5" height="182" rx="1.75" fill="url(#wg)" opacity="0.82"/>
    <rect x="332" y="188" width="3.5" height="136" rx="1.75" fill="url(#wg)" opacity="0.68"/>
    <rect x="341" y="215" width="3.5" height="82" rx="1.75" fill="url(#wg)" opacity="0.52"/>
    <rect x="350" y="235" width="3.5" height="42" rx="1.75" fill="url(#wg)" opacity="0.38"/>

    <!-- O -->
    <rect x="362" y="238" width="3.5" height="36" rx="1.75" fill="url(#wg)" opacity="0.42"/>
    <rect x="371" y="215" width="3.5" height="82" rx="1.75" fill="url(#wg)" opacity="0.58"/>
    <rect x="380" y="185" width="3.5" height="142" rx="1.75" fill="url(#wg)" opacity="0.74"/>
