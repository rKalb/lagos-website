    <rect x="407" y="118" width="3.5" height="276" rx="1.75" fill="url(#wg)"/>
    <rect x="416" y="115" width="3.5" height="282" rx="1.75" fill="url(#wg)"/>
    <rect x="425" y="118" width="3.5" height="276" rx="1.75" fill="url(#wg)"/>
    <rect x="434" y="130" width="3.5" height="252" rx="1.75" fill="url(#wg)" opacity="0.95"/>
    <rect x="443" y="150" width="3.5" height="212" rx="1.75" fill="url(#wg)" opacity="0.82"/>
    <rect x="452" y="178" width="3.5" height="156" rx="1.75" fill="url(#wg)" opacity="0.65"/>
    <rect x="461" y="210" width="3.5" height="92" rx="1.75" fill="url(#wg)" opacity="0.5"/>
    <rect x="470" y="234" width="3.5" height="44" rx="1.75" fill="url(#wg)" opacity="0.35"/>

    <!-- S -->
    <rect x="481" y="240" width="3" height="32" rx="1.5" fill="url(#wg)" opacity="0.3"/>
  </g>

  <!-- LAGOS text -->
  <text x="256" y="448" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="16" font-weight="600" letter-spacing="10" fill="#FF8A5C" opacity="0.25">LAGOS</text>
</svg>
