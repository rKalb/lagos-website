<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4F44"/>
      <stop offset="40%" style="stop-color:#FF7A50"/>
      <stop offset="70%" style="stop-color:#FFB05C"/>
      <stop offset="100%" style="stop-color:#FFC96B"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feFlood flood-color="#FF6A4A" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="b" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E2B3A"/>
      <stop offset="100%" style="stop-color:#232130"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#FF6A4A; stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#232130; stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#rg)"/>

  <!-- App icon (simplified) -->
  <g transform="translate(505, 100) scale(0.37)">
    <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <g filter="url(#gl)">
      <rect x="140" y="238" width="3.5" height="36" rx="1.75" fill="url(#wg)" opacity="0.45"/>
      <rect x="158" y="190" width="3.5" height="132" rx="1.75" fill="url(#wg)" opacity="0.78"/>
      <rect x="176" y="138" width="3.5" height="236" rx="1.75" fill="url(#wg)" opacity="0.96"/>
      <rect x="194" y="120" width="3.5" height="272" rx="1.75" fill="url(#wg)"/>
      <rect x="212" y="138" width="3.5" height="236" rx="1.75" fill="url(#wg)" opacity="0.95"/>
      <rect x="239" y="208" width="3.5" height="96" rx="1.75" fill="url(#wg)" opacity="0.55"/>
      <rect x="269" y="220" width="3.5" height="72" rx="1.75" fill="url(#wg)" opacity="0.6"/>
      <rect x="296" y="155" width="3.5" height="202" rx="1.75" fill="url(#wg)" opacity="0.92"/>
      <rect x="314" y="148" width="3.5" height="216" rx="1.75" fill="url(#wg)" opacity="0.95"/>
      <rect x="341" y="215" width="3.5" height="82" rx="1.75" fill="url(#wg)" opacity="0.52"/>
      <rect x="371" y="215" width="3.5" height="82" rx="1.75" fill="url(#wg)" opacity="0.58"/>
    </g>
  </g>

  <!-- Text -->
  <text x="600" y="360" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', -apple-system, sans-serif" font-size="64" font-weight="700" fill="#FAF9F7" letter-spacing="-2">Lagos</text>
  <text x="600" y="410" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', -apple-system, sans-serif" font-size="24" font-weight="400" fill="rgba(250,249,247,0.5)">Talk instead of type.</text>

  <!-- Tagline bar -->
  <text x="600" y="480" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(250,249,247,0.3)">Voice dictation for Mac — Free forever</text>
</svg>
